<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolle di consegna — campioni OCR</title>
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
      background: #f4f4f4;
      margin: 0;
      padding: 2rem;
    }
    h1 { font-family: sans-serif; font-size: 1.2rem; color: #333; margin-bottom: 1.5rem; }
    .controls { margin-bottom: 2rem; font-family: sans-serif; font-size: 0.875rem; color: #555; }
    .invoice-wrapper { margin-bottom: 3rem; }
    .dl-btn {
      display: inline-block;
      margin-bottom: 0.5rem;
      padding: 0.375rem 0.75rem;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: sans-serif;
      font-size: 0.8125rem;
      cursor: pointer;
    }
    .dl-btn:hover { background: #15803d; }
    canvas { display: block; border: 1px solid #ccc; background: #fff; }
  </style>
</head>
<body>
  <h1>🧾 Bolle di consegna campione per test OCR</h1>
  <div class="controls">
    Clicca <strong>"Scarica"</strong> per salvare ogni bolla come immagine PNG, poi caricala nella sezione Documenti / OCR dell'app.
  </div>

  <div id="invoices"></div>

  <script>
  /**
   * Genera una bolla di consegna su canvas e restituisce
   * l'elemento &lt;canvas&gt; già disegnato.
   */
  function drawInvoice(data) {
    const W = 700, H = 540 + data.items.length * 28;
    const canvas = document.createElement('canvas');
    canvas.width  = W * 2;  // hi-dpi
    canvas.height = H * 2;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);

    // Sfondo
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // Bordo
    ctx.strokeStyle = '#aaaaaa';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(20, 20, W - 40, H - 40);

    // Intestazione fornitore
    ctx.fillStyle = '#1e293b';
    ctx.font = 'bold 16px "Courier New"';
    ctx.fillText(data.supplier.name, 38, 50);
    ctx.font = '10px "Courier New"';
    ctx.fillStyle = '#555555';
    ctx.fillText(data.supplier.address, 38, 65);
    ctx.fillText('P.IVA: ' + data.supplier.vat + '   Tel: ' + data.supplier.phone, 38, 78);

    // Titolo documento
    ctx.fillStyle = '#1e293b';
    ctx.font = 'bold 14px "Courier New"';
    const title = 'BOLLA DI CONSEGNA N. ' + data.docNumber;
    ctx.fillText(title, 38, 108);
    ctx.font = '10px "Courier New"';
    ctx.fillStyle = '#555555';
    ctx.fillText('Data: ' + data.date + '    Destinatario: ' + data.customer, 38, 122);

    // Separatore
    ctx.strokeStyle = '#999999';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(38, 130); ctx.lineTo(W - 38, 130); ctx.stroke();

    // Intestazione tabella
    ctx.fillStyle = '#333333';
    ctx.font = 'bold 10px "Courier New"';
    let y = 148;
    ctx.fillText('DESCRIZIONE PRODOTTO',      38,  y);
    ctx.fillText('QTÀ',                       370, y);
    ctx.fillText('U.M.',                      420, y);
    ctx.fillText('PREZZO UNIT.',              468, y);
    ctx.fillText('IMPORTO',                   574, y);

    ctx.beginPath(); ctx.moveTo(38, y + 6); ctx.lineTo(W - 38, y + 6); ctx.stroke();

    // Righe
    y += 24;
    ctx.font = '10px "Courier New"';
    for (const item of data.items) {
      ctx.fillStyle = '#111111';
      ctx.fillText(item.desc,                          38,  y);
      ctx.fillText(String(item.qty),                  370,  y);
      ctx.fillText(item.unit,                         420,  y);
      ctx.fillText(fmtEur(item.unitPrice) + ' €/' + item.unit, 468, y);
      const total = item.qty * item.unitPrice;
      ctx.fillText(fmtEur(total) + ' €',              574,  y);
      y += 28;
    }

    // Separatore
    ctx.beginPath(); ctx.moveTo(38, y); ctx.lineTo(W - 38, y); ctx.stroke();
    y += 16;

    // Totale
    const grand = data.items.reduce((s, i) => s + i.qty * i.unitPrice, 0);
    ctx.font = 'bold 11px "Courier New"';
    ctx.fillStyle = '#111111';
    ctx.fillText('TOTALE MERCE:', 430, y);
    ctx.fillText(fmtEur(grand) + ' €', 574, y);
    y += 20;
    const iva = grand * 0.1;
    ctx.font = '10px "Courier New"';
    ctx.fillText('IVA 10%:', 430, y);
    ctx.fillText(fmtEur(iva) + ' €', 574, y);
    y += 20;
    ctx.font = 'bold 12px "Courier New"';
    ctx.fillText('TOTALE DA PAGARE:', 430, y);
    ctx.fillText(fmtEur(grand + iva) + ' €', 574, y);
    y += 32;

    // Note
    ctx.font = '9px "Courier New"';
    ctx.fillStyle = '#777777';
    ctx.fillText('Pagamento: Bonifico bancario 30 gg data fattura', 38, y);
    y += 14;
    ctx.fillText('Trasporto: a carico del fornitore. Merce viaggia a rischio del destinatario.', 38, y);
    y += 14;
    ctx.fillText('Merci controllate e accettate dal destinatario alla consegna.', 38, y);
    y += 28;

    // Firma
    ctx.fillText('Firma destinatario: ________________________', 38, y);
    ctx.fillText('Firma autista: ________________', 430, y);

    return canvas;
  }

  function fmtEur(n) {
    return n.toFixed(2).replace('.', ',');
  }

  // ── Dati delle bolle ──────────────────────────────────────────────────────

  const invoices = [
    {

        vat: 'IT08234561230',
        phone: '02 9876543',
      },
      docNumber: '2026/0394',
      date: '10/04/2026',
      customer: 'Ristorante La Cucina di Casa',
      items: [
        { desc: 'Pomodori San Marzano',        qty: 5,   unit: 'kg',  unitPrice: 2.40  },
        { desc: 'Zucchine verdi',               qty: 3,   unit: 'kg',  unitPrice: 1.80  },
        { desc: 'Patate gialle a pasta gialla', qty: 10,  unit: 'kg',  unitPrice: 0.95  },
        { desc: 'Cipolla bianca',               qty: 2,   unit: 'kg',  unitPrice: 1.20  },
        { desc: 'Carote novelle',               qty: 3,   unit: 'kg',  unitPrice: 1.50  },
        { desc: 'Basilico fresco',              qty: 0.5, unit: 'kg',  unitPrice: 8.00  },
        { desc: 'Aglio bianco',                 qty: 1,   unit: 'kg',  unitPrice: 5.60  },
        { desc: 'Limoni Sicilia non trattati',  qty: 2,   unit: 'kg',  unitPrice: 2.10  },
        { desc: 'Insalata romana',              qty: 4,   unit: 'pz',  unitPrice: 0.90  },
        { desc: 'Peperoni rossi',               qty: 2,   unit: 'kg',  unitPrice: 3.20  },
      ],
    },
    {
      id: 'bolla-2-carni-salumi',
      label: 'Bolla 2 — Carni & Salumi',
      supplier: {
        name: 'MACELLERIA INDUSTRIA PADANA S.P.A.',
        address: 'Via Carnello 88, 46100 Mantova (MN)',
        vat: 'IT03451290233',
        phone: '0376 445566',
      },
      docNumber: '2026/1182',
      date: '11/04/2026',
      customer: 'Ristorante La Cucina di Casa',
      items: [
        { desc: 'Petto di pollo senza osso',    qty: 3,   unit: 'kg',  unitPrice: 7.80  },
        { desc: 'Coscia di agnello',             qty: 2,   unit: 'kg',  unitPrice: 14.50 },
        { desc: 'Filetto di manzo fassona',      qty: 1.5, unit: 'kg',  unitPrice: 32.00 },

        { desc: 'Guanciale affumicato',          qty: 0.8, unit: 'kg',  unitPrice: 13.00 },
      ],
    },
    {
      id: 'bolla-3-latticini-secco',
      label: 'Bolla 3 — Latticini & Dispensa',
      supplier: {
        name: 'DISTRIBUZIONE AGROALIMENTARE CENTRO SUD S.R.L.',
        address: 'Via Mazzini 203, 81100 Caserta (CE)',
        vat: 'IT07812340611',
        phone: '0823 331122',
      },
      docNumber: '2026/0781',
      date: '12/04/2026',
      customer: 'Ristorante La Cucina di Casa',
      items: [
        { desc: 'Parmigiano Reggiano 24 mesi',  qty: 2,    unit: 'kg',  unitPrice: 19.00 },
        { desc: 'Mozzarella di bufala DOP',      qty: 1.5,  unit: 'kg',  unitPrice: 15.50 },
        { desc: 'Ricotta vaccina fresca',        qty: 1,    unit: 'kg',  unitPrice: 5.80  },
        { desc: 'Burro non salato 82%',          qty: 1,    unit: 'kg',  unitPrice: 8.40  },
        { desc: 'Olio extra vergine oliva DOP',  qty: 5,    unit: 'l',   unitPrice: 9.50  },
        { desc: 'Farina 00 tipo forte W320',     qty: 10,   unit: 'kg',  unitPrice: 0.85  },
        { desc: 'Semolina rimacinata',           qty: 5,    unit: 'kg',  unitPrice: 1.10  },
        { desc: 'Zucchero semolato',             qty: 3,    unit: 'kg',  unitPrice: 1.25  },
        { desc: 'Sale fino marino',              qty: 2,    unit: 'kg',  unitPrice: 0.60  },
        { desc: 'Aceto balsamico di Modena IGP', qty: 0.75, unit: 'l',   unitPrice: 18.00 },
        { desc: 'Vino bianco secco per cucina',  qty: 1.5,  unit: 'l',   unitPrice: 4.20  },
      ],
    },
  ];

  const container = document.getElementById('invoices');

  for (const inv of invoices) {
    const wrapper = document.createElement('div');
    wrapper.className = 'invoice-wrapper';

    const btn = document.createElement('button');
    btn.className = 'dl-btn';
    btn.textContent = '⬇ Scarica — ' + inv.label;
    btn.onclick = () => {
      const canvas = drawInvoice(inv);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = inv.id + '.png';
      a.click();
    };

    const canvas = drawInvoice(inv);
    wrapper.appendChild(btn);
    wrapper.appendChild(canvas);
    container.appendChild(wrapper);
  }
  </script>
</body>
</html>
