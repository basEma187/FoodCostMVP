<div class="flex h-screen font-sans">

  <!-- Sidebar — dark navy, ispirata Revolut -->
  <aside
    class="w-60 shrink-0 flex flex-col"
    style="background-color: var(--color-sidebar);"
    aria-label="Navigazione applicazione"
  >
    <!-- Brand -->
    <div class="px-5 py-5 border-b" style="border-color: rgba(255,255,255,0.08);">
      <div class="flex items-center gap-2">
        <span
          class="flex items-center justify-center w-8 h-8 rounded-lg text-white font-bold text-sm"
          style="background-color: var(--color-accent);"
          aria-hidden="true"
        >FC</span>
        <div>
          <p class="text-white font-semibold text-sm leading-tight tracking-tight">FoodCost</p>
          <p class="text-xs leading-tight" style="color: rgba(255,255,255,0.4);">Gestione costi cucina</p>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav aria-label="Navigazione principale" class="flex-1 px-3 py-4 space-y-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="nav-item--active"
          class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors"
          style="color: rgba(255,255,255,0.65);"
        >
          <mat-icon
            class="!w-5 !h-5 !text-[20px] shrink-0"
            aria-hidden="true"
          >{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Footer -->
    <div class="px-5 py-4 border-t" style="border-color: rgba(255,255,255,0.08);">
      <p class="text-xs" style="color: rgba(255,255,255,0.3);">v0.1.0 — MVP</p>
    </div>
  </aside>

  <!-- Main content -->
  <main
    id="main-content"
    tabindex="-1"
    class="flex-1 overflow-y-auto p-6"
    style="background-color: var(--color-surface);"
  >
    <router-outlet />
  </main>

</div>
