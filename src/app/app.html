<div class="flex h-screen bg-gray-50 font-sans">
  <!-- Sidebar -->
  <aside class="w-56 shrink-0 bg-white border-r border-gray-200 flex flex-col">
    <div class="px-5 py-4 border-b border-gray-200">
      <span class="text-lg font-bold text-emerald-700 tracking-tight">FoodCost</span>
      <span class="block text-xs text-gray-400 mt-0.5">MVP</span>
    </div>
    <nav aria-label="Navigazione principale" class="flex-1 px-3 py-4 space-y-1">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-emerald-50 text-emerald-700 font-semibold"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100 transition-colors"
        >
          <span aria-hidden="true">{{ item.icon }}</span>
          {{ item.label }}
        </a>
      }
    </nav>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto p-6" id="main-content" tabindex="-1">
    <router-outlet />
  </main>
</div>
