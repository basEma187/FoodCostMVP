<div class="max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">Impostazioni</h1>

  <div class="space-y-6">
    <!-- Costi energia -->
    <section aria-labelledby="energy-heading" class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
      <h2 id="energy-heading" class="text-base font-semibold text-gray-800 mb-4">Energia</h2>
      <div>
        <label for="kwh-cost" class="block text-sm font-medium text-gray-700 mb-1">Costo energia (€/kWh)</label>
        <input
          id="kwh-cost"
          type="number"
          min="0"
          step="0.01"
          [ngModel]="settings().electricityCostPerKwh"
          (ngModelChange)="update({ electricityCostPerKwh: +$event })"
          class="w-48 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
        />
      </div>
    </section>

    <!-- Costi personale -->
    <section aria-labelledby="staff-heading" class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
      <h2 id="staff-heading" class="text-base font-semibold text-gray-800 mb-4">Personale</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="staff-count" class="block text-sm font-medium text-gray-700 mb-1">Numero dipendenti</label>
          <input
            id="staff-count"
            type="number"
            min="0"
            [ngModel]="settings().staffCount"
            (ngModelChange)="update({ staffCount: +$event })"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
          />
        </div>
        <div>
          <label for="avg-salary" class="block text-sm font-medium text-gray-700 mb-1">Stipendio medio (€/mese)</label>
          <input
            id="avg-salary"
            type="number"
            min="0"
            [ngModel]="settings().averageMonthlySalary"
            (ngModelChange)="update({ averageMonthlySalary: +$event })"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
          />
        </div>
      </div>
      <p class="mt-3 text-sm text-gray-500">
        Costo orario stimato:
        <strong class="text-gray-900">{{ hourlyCost() | number:'1.2-2' }} €/h</strong>
      </p>
    </section>

    <!-- OCR -->
    <section aria-labelledby="ocr-heading" class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
      <h2 id="ocr-heading" class="text-base font-semibold text-gray-800 mb-4">Lettura documenti (OCR)</h2>
      <div class="mb-4">
        <fieldset>
          <legend class="block text-sm font-medium text-gray-700 mb-2">Provider OCR</legend>
          <div class="flex gap-4">
            <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
              <input
                type="radio"
                name="ocr-provider"
                value="tesseract"
                [ngModel]="settings().ocrProvider"
                (ngModelChange)="update({ ocrProvider: $event })"
                class="text-emerald-600 focus:ring-emerald-500"
              />
              Tesseract.js (offline, gratuito)
            </label>
            <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
              <input
                type="radio"
                name="ocr-provider"
                value="openai"
                [ngModel]="settings().ocrProvider"
                (ngModelChange)="update({ ocrProvider: $event })"
                class="text-emerald-600 focus:ring-emerald-500"
              />
              GPT-4o Vision (richiede API key)
            </label>
          </div>
        </fieldset>
      </div>
      @if (settings().ocrProvider === 'openai') {
        <div>
          <label for="openai-key" class="block text-sm font-medium text-gray-700 mb-1">
            OpenAI API Key
          </label>
          <input
            id="openai-key"
            type="password"
            autocomplete="off"
            placeholder="sk-..."
            [ngModel]="settings().openaiApiKey"
            (ngModelChange)="update({ openaiApiKey: $event })"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-emerald-500"
          />
          <p class="mt-1 text-xs text-gray-400">La chiave viene salvata solo in LocalStorage nel tuo browser.</p>
        </div>
      }
    </section>

    <div class="flex items-center gap-4">
      <button
        (click)="save()"
        class="px-5 py-2 bg-emerald-600 text-white text-sm font-medium rounded-lg hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition-colors"
        aria-live="polite"
      >
        Salva impostazioni
      </button>
      @if (saved()) {
        <span class="text-sm text-emerald-600 font-medium" role="status">Salvato &#10003;</span>
      }
    </div>
  </div>
</div>
